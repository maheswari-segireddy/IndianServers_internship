<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <header>
            <h1>Tic Tac Toe</h1>
            <div class="score-container">
                <div class="score-box player-x">
                    <span class="label">Player X</span>
                    <span class="score" id="score-x">0</span>
                </div>
                <div class="score-box draws">
                    <span class="label">Draws</span>
                    <span class="score" id="score-draw">0</span>
                </div>
                <div class="score-box player-o">
                    <span class="label">Player O</span>
                    <span class="score" id="score-o">0</span>
                </div>
            </div>
            <div class="turn-indicator" id="turn-indicator">
                Player <span id="current-player" class="x-color">X</span>'s Turn
            </div>
        </header>

        <main class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </main>

        <div class="controls">
            <button id="restart-btn" class="btn">Restart Game</button>
        </div>

        <div class="modal hidden" id="winner-modal">
            <div class="modal-content">
                <h2 id="winner-message">Player X Wins!</h2>
                <button id="play-again-btn" class="btn primary">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
