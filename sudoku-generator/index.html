<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sudoku Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sudoku</h1>
            <p>Generate, play, and solve.</p>
        </header>

        <main>
            <div class="controls">
                <div class="difficulty-selector">
                    <label for="difficulty">Difficulty:</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
                <div class="action-buttons">
                    <button id="new-game-btn" class="primary-btn">New Game</button>
                    <button id="solve-btn" class="secondary-btn">Solve</button>
                </div>
            </div>

            <div class="board-container">
                <div id="sudoku-board" class="sudoku-board">
                    <!-- Grid cells will be generated by JavaScript -->
                </div>
            </div>
            
            <div id="status-message" class="status-message"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
