<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Game</title>
    <meta name="description" content="A premium, neon-themed classic Snake Game.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>SNAKE</h1>
            <div class="score-board">
                <div class="score-card">
                    <span class="label">Score</span>
                    <span class="value" id="current-score">0</span>
                </div>
                <div class="score-card high-score">
                    <span class="label">High Score</span>
                    <span class="value" id="high-score">0</span>
                </div>
            </div>
        </header>

        <main class="game-area">
            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="400" height="400"></canvas>
                
                <div class="overlay" id="start-overlay">
                    <h2>Ready?</h2>
                    <p>Use arrow keys to move</p>
                    <button id="start-btn" class="btn primary-btn">Play Game</button>
                </div>
                
                <div class="overlay hidden" id="game-over-overlay">
                    <h2>Game Over</h2>
                    <p>You scored: <span id="final-score">0</span></p>
                    <button id="restart-btn" class="btn primary-btn">Play Again</button>
                </div>
            </div>

            <div class="mobile-controls">
                <button class="control-btn" id="btn-up">↑</button>
                <div class="horizontal-controls">
                    <button class="control-btn" id="btn-left">←</button>
                    <button class="control-btn" id="btn-down">↓</button>
                    <button class="control-btn" id="btn-right">→</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
